<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrador | DeltaF</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f8fb;
      color: #1f2937;
    }

    header {
      background: #0284c7;
      color: white;
      padding: 18px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .logout {
      background: white;
      color: #0284c7;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .container {
      padding: 30px;
      max-width: 1200px;
      margin: auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #64748b;
    }

    .card p {
      margin: 0;
      font-size: 30px;
      font-weight: bold;
      color: #0284c7;
    }

    .section {
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 30px;
      overflow-x: auto;
    }

    .section h2 {
      margin-top: 0;
      color: #0f172a;
    }

    button.export {
      background: #16a34a;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 12px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #e0f2fe;
      color: #075985;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .pendiente {
      background: #fef3c7;
      color: #92400e;
    }

    .emitida {
      background: #dcfce7;
      color: #166534;
    }

    .rechazada {
      background: #fee2e2;
      color: #991b1b;
    }

    .aprobado {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      display: none;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Panel Administrador DeltaF</h1>
  <button class="logout" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<div class="container">

  <div id="mensajeError" class="error"></div>

  <div class="cards">
    <div class="card">
      <h3>Total ventas del día</h3>
      <p id="ventasDia">$0</p>
    </div>

    <div class="card">
      <h3>Total ventas del mes</h3>
      <p id="ventasMes">$0</p>
    </div>

    <div class="card">
      <h3>Solicitudes pendientes</h3>
      <p id="solicitudesPendientes">0</p>
    </div>

    <div class="card">
      <h3>Órdenes emitidas</h3>
      <p id="ordenesEmitidas">0</p>
    </div>

    <div class="card">
      <h3>Profesionales registrados</h3>
      <p id="profesionalesRegistrados">0</p>
    </div>
  </div>

  <div class="section">
    <h2>Resumen administrativo</h2>
    <button class="export" onclick="exportarExcel()">Exportar Excel</button>

    <table id="tablaSolicitudes">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Paciente</th>
          <th>RUT</th>
          <th>Profesional</th>
          <th>Exámenes</th>
          <th>Monto</th>
          <th>Estado</th>
          <th>Código Transbank</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="8">Cargando datos...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const SUPABASE_URL = "https://goxkmtnmfessroveanje.supabase.co";
  const SUPABASE_KEY = "PEGA_AQUI_TU_ANON_KEY";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let solicitudesGlobal = [];

  function mostrarError(texto) {
    const div = document.getElementById("mensajeError");
    div.style.display = "block";
    div.innerText = texto;
  }

  function formatoPeso(valor) {
    return new Intl.NumberFormat("es-CL", {
      style: "currency",
      currency: "CLP",
      maximumFractionDigits: 0
    }).format(valor || 0);
  }

  function fechaHoyChile() {
    return new Date().toISOString().split("T")[0];
  }

  function esMismoMes(fecha) {
    const hoy = new Date();
    const f = new Date(fecha);
    return hoy.getMonth() === f.getMonth() && hoy.getFullYear() === f.getFullYear();
  }

  async function cargarDashboard() {
    try {
      const { data: solicitudes, error: errorSolicitudes } = await supabaseClient
        .from("solicitudes")
        .select("*")
        .order("created_at", { ascending: false });

      if (errorSolicitudes) throw errorSolicitudes;

      const { data: profesionales, error: errorProfesionales } = await supabaseClient
        .from("profesionales")
        .select("*");

      if (errorProfesionales) throw errorProfesionales;

      solicitudesGlobal = solicitudes || [];

      let hoy = fechaHoyChile();

      let ventasDia = 0;
      let ventasMes = 0;
      let pendientes = 0;
      let emitidas = 0;

      solicitudesGlobal.forEach(s => {
        const fecha = s.created_at ? s.created_at.split("T")[0] : "";

        const monto = Number(s.monto || s.valor || 0);

        if (fecha === hoy) ventasDia += monto;
        if (s.created_at && esMismoMes(s.created_at)) ventasMes += monto;

        if ((s.estado || "").toLowerCase() === "pendiente") pendientes++;
        if ((s.estado || "").toLowerCase() === "emitida") emitidas++;
      });

      document.getElementById("ventasDia").innerText = formatoPeso(ventasDia);
      document.getElementById("ventasMes").innerText = formatoPeso(ventasMes);
      document.getElementById("solicitudesPendientes").innerText = pendientes;
      document.getElementById("ordenesEmitidas").innerText = emitidas;
      document.getElementById("profesionalesRegistrados").innerText = profesionales ? profesionales.length : 0;

      pintarTabla(solicitudesGlobal);

    } catch (error) {
      console.error(error);
      mostrarError("Error al cargar el panel: " + error.message);
    }
  }

  function pintarTabla(solicitudes) {
    const tbody = document.querySelector("#tablaSolicitudes tbody");
    tbody.innerHTML = "";

    if (!solicitudes || solicitudes.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8">No hay solicitudes registradas.</td></tr>`;
      return;
    }

    solicitudes.forEach(s => {
      const estado = (s.estado || "pendiente").toLowerCase();

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${s.created_at ? new Date(s.created_at).toLocaleDateString("es-CL") : "-"}</td>
        <td>${s.paciente_nombre || s.nombre_paciente || "-"}</td>
        <td>${s.paciente_rut || s.rut_paciente || "-"}</td>
        <td>${s.profesional_nombre || s.nombre_profesional || "-"}</td>
        <td>${s.examenes || s.examen_solicitado || "-"}</td>
        <td>${formatoPeso(Number(s.monto || s.valor || 0))}</td>
        <td><span class="badge ${estado}">${s.estado || "Pendiente"}</span></td>
        <td>${s.codigo_transbank || s.codigo_pago || "-"}</td>
      `;

      tbody.appendChild(tr);
    });
  }

  function exportarExcel() {
    if (!solicitudesGlobal || solicitudesGlobal.length === 0) {
      alert("No hay datos para exportar.");
      return;
    }

    let csv = "Fecha,Paciente,RUT,Profesional,Examenes,Monto,Estado,Codigo Transbank\n";

    solicitudesGlobal.forEach(s => {
      csv += `"${s.created_at ? new Date(s.created_at).toLocaleDateString("es-CL") : "-"}",`;
      csv += `"${s.paciente_nombre || s.nombre_paciente || "-"}",`;
      csv += `"${s.paciente_rut || s.rut_paciente || "-"}",`;
      csv += `"${s.profesional_nombre || s.nombre_profesional || "-"}",`;
      csv += `"${s.examenes || s.examen_solicitado || "-"}",`;
      csv += `"${s.monto || s.valor || 0}",`;
      csv += `"${s.estado || "Pendiente"}",`;
      csv += `"${s.codigo_transbank || s.codigo_pago || "-"}"\n`;
    });

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = "reporte_admin_deltaf.csv";
    link.click();

    URL.revokeObjectURL(url);
  }

  async function cerrarSesion() {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
  }

  cargarDashboard();
</script>

</body>
</html>
