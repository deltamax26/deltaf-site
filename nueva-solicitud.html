<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nueva Solicitud | DeltaF</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#f8fafc;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
margin-bottom:25px;
text-align:center;
}

.header img{
width:220px;
margin-bottom:15px;
}

.header h1{
color:#2563eb;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
margin-bottom:25px;
}

.card h2{
color:#2563eb;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1/-1;
}

label{
display:block;
font-weight:600;
margin-bottom:8px;
}

input,
textarea,
select{
width:100%;
padding:14px;
border:1px solid #cbd5e1;
border-radius:10px;
}

.checkbox-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px;
}

.checkbox-item{
background:#f8fafc;
padding:12px;
border-radius:10px;
border:1px solid #e2e8f0;
}

.btn{
width:100%;
background:#2563eb;
color:white;
padding:18px;
border:none;
border-radius:12px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
background:#1d4ed8;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<img src="img/logo-deltaf.png">

<h1>Nueva Solicitud de Exámenes</h1>

</div>

<div class="card">

<h2>Datos del Paciente</h2>

<div class="grid">

<div>
<label>Nombre Completo</label>
<input type="text">
</div>

<div>
<label>RUT</label>
<input type="text">
</div>

<div>
<label>Fecha de Nacimiento</label>
<input type="date">
</div>

<div>
<label>Teléfono</label>
<input type="text">
</div>

<div class="full">
<label>Correo Electrónico</label>
<input type="email">
</div>

<div class="full">
<label>Dirección</label>
<input type="text">
</div>

</div>

</div>

<div class="card">

<h2>Exámenes de Laboratorio</h2>

<div class="checkbox-grid">

<label class="checkbox-item"><input type="checkbox"> Hemograma</label>
<label class="checkbox-item"><input type="checkbox"> Perfil Bioquímico</label>
<label class="checkbox-item"><input type="checkbox"> Perfil Lipídico</label>
<label class="checkbox-item"><input type="checkbox"> Glicemia</label>
<label class="checkbox-item"><input type="checkbox"> HbA1c</label>
<label class="checkbox-item"><input type="checkbox"> Perfil Hepático</label>
<label class="checkbox-item"><input type="checkbox"> Perfil Renal</label>
<label class="checkbox-item"><input type="checkbox"> TSH</label>
<label class="checkbox-item"><input type="checkbox"> T4 Libre</label>
<label class="checkbox-item"><input type="checkbox"> Vitamina D</label>
<label class="checkbox-item"><input type="checkbox"> Ferritina</label>
<label class="checkbox-item"><input type="checkbox"> Vitamina B12</label>
<label class="checkbox-item"><input type="checkbox"> Insulina</label>
<label class="checkbox-item"><input type="checkbox"> PCR</label>
<label class="checkbox-item"><input type="checkbox"> VHS</label>

</div>

</div>

<div class="card">

<h2>Radiografías</h2>

<div class="checkbox-grid">

<label class="checkbox-item"><input type="checkbox"> Tórax</label>
<label class="checkbox-item"><input type="checkbox"> Columna Cervical</label>
<label class="checkbox-item"><input type="checkbox"> Columna Lumbar</label>
<label class="checkbox-item"><input type="checkbox"> Pelvis</label>
<label class="checkbox-item"><input type="checkbox"> Hombro</label>
<label class="checkbox-item"><input type="checkbox"> Rodilla</label>
<label class="checkbox-item"><input type="checkbox"> Tobillo</label>
<label class="checkbox-item"><input type="checkbox"> Pie</label>

</div>

</div>

<div class="card">

<h2>Otros Exámenes</h2>

<label>Examen Solicitado</label>

<input type="text">

<br><br>

<label>Justificación Clínica</label>

<textarea rows="5"></textarea>

</div>

<div class="card">

<h2>Observaciones Clínicas</h2>

<textarea rows="7"></textarea>

</div>

<button class="btn">

Enviar Solicitud al Médico Autorizador

</button>

</div>

</body>

</html>
