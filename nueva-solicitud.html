<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva Solicitud | DeltaF</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
body{background:#f8fafc;padding:30px;color:#1e293b;}
.container{max-width:1200px;margin:auto;}
.header{background:white;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.06);margin-bottom:25px;text-align:center;}
.header img{width:220px;margin-bottom:15px;}
.header h1{color:#2563eb;}
.card{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.06);margin-bottom:25px;}
.card h2{color:#2563eb;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.full{grid-column:1/-1;}
label{display:block;font-weight:600;margin-bottom:8px;}
input,textarea,select{width:100%;padding:14px;border:1px solid #cbd5e1;border-radius:10px;}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;}
.checkbox-item{background:#f8fafc;padding:12px;border-radius:10px;border:1px solid #e2e8f0;}
.checkbox-item input{width:auto;margin-right:8px;}
.btn{width:100%;background:#2563eb;color:white;padding:18px;border:none;border-radius:12px;font-size:1rem;font-weight:bold;cursor:pointer;}
.btn:hover{background:#1d4ed8;}
.btn:disabled{background:#94a3b8;cursor:not-allowed;}
.message{display:none;margin-bottom:20px;padding:15px;border-radius:10px;font-weight:700;}
.message.success{display:block;background:#dcfce7;color:#166534;border:1px solid #86efac;}
.message.error{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.message.info{display:block;background:#eff6ff;color:#1e40af;border:1px solid #93c5fd;}
.saldo-box{background:#eff6ff;border-left:5px solid #2563eb;padding:18px;border-radius:12px;margin-bottom:25px;font-weight:700;color:#1e40af;}
.top-links{margin-top:15px;}
.top-links a{color:#2563eb;text-decoration:none;font-weight:700;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}body{padding:15px;}}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="./img/logo-deltaf.png" alt="DeltaF">
<h1>Nueva Solicitud de Exámenes</h1>
<div class="top-links">
<a href="dashboard-profesional.html">← Volver al Dashboard</a>
</div>
</div>

<div id="mensaje" class="message"></div>

<div id="saldoBox" class="saldo-box">
Verificando órdenes disponibles...
</div>

<form id="solicitudForm">

<div class="card">
<h2>Datos del Paciente</h2>

<div class="grid">
<div>
<label for="nombrePaciente">Nombre Completo</label>
<input id="nombrePaciente" type="text" required>
</div>

<div>
<label for="rutPaciente">RUT</label>
<input id="rutPaciente" type="text" required>
</div>

<div>
<label for="fechaNacimiento">Fecha de Nacimiento</label>
<input id="fechaNacimiento" type="date">
</div>

<div>
<label for="telefonoPaciente">Teléfono</label>
<input id="telefonoPaciente" type="text">
</div>

<div class="full">
<label for="correoPaciente">Correo Electrónico</label>
<input id="correoPaciente" type="email">
</div>

<div class="full">
<label for="direccionPaciente">Dirección</label>
<input id="direccionPaciente" type="text">
</div>
</div>
</div>

<div class="card">
<h2>Exámenes de Laboratorio</h2>

<div class="checkbox-grid">
<label class="checkbox-item"><input type="checkbox" value="Hemograma" class="examen"> Hemograma</label>
<label class="checkbox-item"><input type="checkbox" value="Perfil Bioquímico" class="examen"> Perfil Bioquímico</label>
<label class="checkbox-item"><input type="checkbox" value="Perfil Lipídico" class="examen"> Perfil Lipídico</label>
<label class="checkbox-item"><input type="checkbox" value="Glicemia" class="examen"> Glicemia</label>
<label class="checkbox-item"><input type="checkbox" value="HbA1c" class="examen"> HbA1c</label>
<label class="checkbox-item"><input type="checkbox" value="Perfil Hepático" class="examen"> Perfil Hepático</label>
<label class="checkbox-item"><input type="checkbox" value="Perfil Renal" class="examen"> Perfil Renal</label>
<label class="checkbox-item"><input type="checkbox" value="TSH" class="examen"> TSH</label>
<label class="checkbox-item"><input type="checkbox" value="T4 Libre" class="examen"> T4 Libre</label>
<label class="checkbox-item"><input type="checkbox" value="Vitamina D" class="examen"> Vitamina D</label>
<label class="checkbox-item"><input type="checkbox" value="Ferritina" class="examen"> Ferritina</label>
<label class="checkbox-item"><input type="checkbox" value="Vitamina B12" class="examen"> Vitamina B12</label>
<label class="checkbox-item"><input type="checkbox" value="Insulina" class="examen"> Insulina</label>
<label class="checkbox-item"><input type="checkbox" value="PCR" class="examen"> PCR</label>
<label class="checkbox-item"><input type="checkbox" value="VHS" class="examen"> VHS</label>
</div>
</div>

<div class="card">
<h2>Radiografías</h2>

<div class="checkbox-grid">
<label class="checkbox-item"><input type="checkbox" value="Radiografía de Tórax" class="examen"> Tórax</label>
<label class="checkbox-item"><input type="checkbox" value="Radiografía Columna Cervical" class="examen"> Columna Cervical</label>
<label class="checkbox-item"><input type="checkbox" value="Radiografía Columna Lumbar" class="examen"> Columna Lumbar</label>
<label class="checkbox-item"><input type="checkbox" value="Radiografía de Pelvis" class="examen"> Pelvis</label>
<label class="checkbox-item"><input type="checkbox" value="Radiografía de Hombro" class="examen"> Hombro</label>
<label class="checkbox-item"><input type="checkbox" value="Radiografía de Rodilla" class="examen"> Rodilla</label>
<label class="checkbox-item"><input type="checkbox" value="Radiografía de Tobillo" class="examen"> Tobillo</label>
<label class="checkbox-item"><input type="checkbox" value="Radiografía de Pie" class="examen"> Pie</label>
</div>
</div>

<div class="card">
<h2>Otros Exámenes</h2>

<label for="otroExamen">Examen Solicitado</label>
<input id="otroExamen" type="text">

<br><br>

<label for="justificacionClinica">Justificación Clínica</label>
<textarea id="justificacionClinica" rows="5"></textarea>
</div>

<div class="card">
<h2>Observaciones Clínicas</h2>
<textarea id="observaciones" rows="7"></textarea>
</div>

<button id="btnEnviar" class="btn" type="submit">
Enviar Solicitud al Médico Autorizador
</button>

</form>

</div>

<script>
const SUPABASE_URL = "https://goxkmtnmfessroveanje.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_w8xrtEanlJJAc5FYvk1X5A_fKu9vb5d";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("solicitudForm");
const mensaje = document.getElementById("mensaje");
const btnEnviar = document.getElementById("btnEnviar");
const saldoBox = document.getElementById("saldoBox");

let profesionalActual = null;

function mostrarMensaje(texto,tipo){
mensaje.textContent = texto;
mensaje.className = "message " + tipo;
window.scrollTo({top:0,behavior:"smooth"});
}

function generarCodigo(){
const fecha = new Date();
const numero = Math.floor(100000 + Math.random() * 900000);
return "DF-" + fecha.getFullYear() + "-" + numero;
}

async function obtenerProfesional(){
const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();

if(sessionError || !sessionData.session){
window.location.href = "login.html";
return null;
}

const email = sessionData.session.user.email.toLowerCase();

const { data: profesional, error } = await supabaseClient
.from("profesionales")
.select("*")
.eq("email", email)
.limit(1);

if(error || !profesional || profesional.length === 0){
mostrarMensaje("No se encontró el profesional asociado a esta sesión.", "error");
return null;
}

const perfil = profesional[0];

if(perfil.estado !== "aprobado"){
await supabaseClient.auth.signOut();
window.location.href = "login.html";
return null;
}

return perfil;
}

async function cargarSaldoInicial(){
profesionalActual = await obtenerProfesional();

if(!profesionalActual){
saldoBox.textContent = "No se pudo verificar el saldo de órdenes.";
return;
}

const saldo = profesionalActual.ordenes_disponibles || 0;

saldoBox.textContent = "Órdenes disponibles: " + saldo;

if(saldo <= 0){
mostrarMensaje("No tienes órdenes disponibles. Debes comprar órdenes antes de crear una solicitud.", "error");
btnEnviar.disabled = true;
btnEnviar.textContent = "Sin órdenes disponibles";
}
}

form.addEventListener("submit", async function(event){
event.preventDefault();

btnEnviar.disabled = true;
btnEnviar.textContent = "Enviando solicitud...";

try{
const profesional = await obtenerProfesional();

if(!profesional){
btnEnviar.disabled = false;
btnEnviar.textContent = "Enviar Solicitud al Médico Autorizador";
return;
}

const saldoActual = profesional.ordenes_disponibles || 0;

if(saldoActual <= 0){
mostrarMensaje("No tienes órdenes disponibles. Debes comprar órdenes antes de crear una solicitud.", "error");
btnEnviar.disabled = true;
btnEnviar.textContent = "Sin órdenes disponibles";
return;
}

const nombrePaciente = document.getElementById("nombrePaciente").value.trim();
const rutPaciente = document.getElementById("rutPaciente").value.trim();
const correoPaciente = document.getElementById("correoPaciente").value.trim().toLowerCase();
const telefonoPaciente = document.getElementById("telefonoPaciente").value.trim();
const direccionPaciente = document.getElementById("direccionPaciente").value.trim();
const fechaNacimiento = document.getElementById("fechaNacimiento").value;
const otroExamen = document.getElementById("otroExamen").value.trim();
const justificacionClinica = document.getElementById("justificacionClinica").value.trim();
const observaciones = document.getElementById("observaciones").value.trim();

const examenesSeleccionados = Array.from(document.querySelectorAll(".examen:checked")).map(e => e.value);

if(otroExamen){
examenesSeleccionados.push(otroExamen);
}

if(examenesSeleccionados.length === 0){
mostrarMensaje("Debes seleccionar o escribir al menos un examen.", "error");
btnEnviar.disabled = false;
btnEnviar.textContent = "Enviar Solicitud al Médico Autorizador";
return;
}

const textoExamenes = examenesSeleccionados.join(", ");

const motivoFinal = [
"Exámenes solicitados: " + textoExamenes,
fechaNacimiento ? "Fecha de nacimiento: " + fechaNacimiento : "",
telefonoPaciente ? "Teléfono paciente: " + telefonoPaciente : "",
direccionPaciente ? "Dirección paciente: " + direccionPaciente : "",
justificacionClinica ? "Justificación clínica: " + justificacionClinica : "",
observaciones ? "Observaciones: " + observaciones : ""
].filter(Boolean).join("\n\n");

const { error: ordenError } = await supabaseClient
.from("ordenes")
.insert([
{
codigo: generarCodigo(),
profesional_id: profesional.id,
tipo_orden: textoExamenes,
motivo: motivoFinal,
estado: "pendiente",
nombre_paciente: nombrePaciente,
rut_paciente: rutPaciente,
correo_paciente: correoPaciente,
observaciones: observaciones
}
]);

if(ordenError){
throw ordenError;
}

const nuevasOrdenes = saldoActual - 1;

const { error: updateError } = await supabaseClient
.from("profesionales")
.update({
ordenes_disponibles: nuevasOrdenes
})
.eq("id", profesional.id);

if(updateError){
throw updateError;
}

saldoBox.textContent = "Órdenes disponibles: " + nuevasOrdenes;

mostrarMensaje("Solicitud enviada correctamente. Se descontó 1 orden disponible.", "success");

form.reset();

setTimeout(function(){
window.location.href = "mis-solicitudes.html";
}, 1500);

}catch(error){
console.error(error);
mostrarMensaje("Error al enviar la solicitud: " + error.message, "error");
btnEnviar.disabled = false;
btnEnviar.textContent = "Enviar Solicitud al Médico Autorizador";
return;
}

btnEnviar.disabled = false;
btnEnviar.textContent = "Enviar Solicitud al Médico Autorizador";
});

cargarSaldoInicial();
</script>

</body>
</html>
