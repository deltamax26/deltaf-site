<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Validar Orden | DeltaF</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#f8fafc;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:700px;
padding:40px;
border-radius:24px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:220px;
}

.valid{
background:#dcfce7;
border:1px solid #86efac;
color:#166534;
padding:18px;
border-radius:12px;
font-size:1.2rem;
font-weight:800;
margin-bottom:25px;
text-align:center;
}

.invalid{
background:#fee2e2;
border:1px solid #fca5a5;
color:#991b1b;
padding:18px;
border-radius:12px;
font-size:1.2rem;
font-weight:800;
margin-bottom:25px;
text-align:center;
}

.field{
background:#f8fafc;
padding:15px;
border-radius:10px;
margin-bottom:12px;
}

.label{
font-size:.85rem;
color:#64748b;
margin-bottom:5px;
}

.value{
font-weight:700;
color:#0f172a;
}

.loading{
text-align:center;
font-size:1.2rem;
color:#64748b;
}

.footer{
margin-top:25px;
text-align:center;
color:#64748b;
font-size:.9rem;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="./img/logo-deltaf.png" alt="DeltaF">
</div>

<div id="contenido">

<div class="loading">
Validando orden médica...
</div>

</div>

<div class="footer">
DeltaF · Profesional y Seguro
</div>

</div>

<script>

const SUPABASE_URL = "https://goxkmtnmfessroveanje.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_w8xrtEanlJJAc5FYvk1X5A_fKu9vb5d";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

function obtenerParametro(nombre){
const params = new URLSearchParams(window.location.search);
return params.get(nombre);
}

async function validarOrden(){

const codigo = obtenerParametro("codigo");

const contenido = document.getElementById("contenido");

if(!codigo){

contenido.innerHTML = `
<div class="invalid">
❌ Código no informado
</div>
`;

return;

}

const { data, error } = await supabaseClient
.from("ordenes")
.select("*")
.eq("codigo", codigo)
.single();

if(error || !data){

contenido.innerHTML = `
<div class="invalid">
❌ Orden no encontrada
</div>
`;

return;

}

contenido.innerHTML = `

<div class="valid">
✅ ORDEN VÁLIDA
</div>

<div class="field">
<div class="label">Código</div>
<div class="value">${data.codigo}</div>
</div>

<div class="field">
<div class="label">Paciente</div>
<div class="value">${data.nombre_paciente || "-"}</div>
</div>

<div class="field">
<div class="label">RUT</div>
<div class="value">${data.rut_paciente || "-"}</div>
</div>

<div class="field">
<div class="label">Estado</div>
<div class="value">${data.estado || "-"}</div>
</div>

<div class="field">
<div class="label">Fecha Solicitud</div>
<div class="value">
${new Date(data.created_at).toLocaleDateString("es-CL")}
</div>
</div>

<div class="field">
<div class="label">Médico Autorizador</div>
<div class="value">
Dra. Carolina Domínguez
</div>
</div>

<div class="field">
<div class="label">Registro SIS</div>
<div class="value">
544925
</div>
</div>

`;

}

validarOrden();

</script>

</body>
</html>
