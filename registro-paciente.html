<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitud para Pacientes | DeltaF</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#f8fafc;
color:#1e293b;
}

header{
background:linear-gradient(135deg,#2563eb,#06b6d4);
padding:30px;
text-align:center;
}

header img{
max-width:250px;
}

.container{
max-width:1000px;
margin:40px auto;
padding:20px;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#64748b;
margin-bottom:35px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1 / -1;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #cbd5e1;
border-radius:10px;
}

button{
width:100%;
padding:16px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.info{
margin-top:25px;
padding:20px;
background:#eff6ff;
border-left:4px solid #2563eb;
border-radius:10px;
}

@media(max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>
<img src="img/logo-deltaf.png" alt="DeltaF">
</header>

<div class="container">

<div class="card">

<h1>Solicitud de Exámenes para Pacientes</h1>

<p class="subtitle">
Complete el formulario para solicitar una orden médica para exámenes clínicos.
</p>

<form>

<div class="form-grid">

<div>
<label>Nombre Completo</label>
<input type="text" required>
</div>

<div>
<label>RUT</label>
<input type="text" required>
</div>

<div>
<label>Teléfono</label>
<input type="tel" required>
</div>

<div>
<label>Correo Electrónico</label>
<input type="email" required>
</div>

<div class="full">
<label>Dirección</label>
<input type="text" required>
</div>

<div class="full">
<label>Tipo de Solicitud</label>
<select>
<option>Exámenes de Laboratorio</option>
<option>Radiografía</option>
<option>Otros Exámenes</option>
</select>
</div>

<div class="full">
<label>Detalle de los Exámenes Solicitados</label>
<textarea rows="6"></textarea>
</div>

<div class="full">
<label>Motivo de la Solicitud</label>
<textarea rows="5"></textarea>
</div>

<div class="full">
<button type="submit">
Enviar Solicitud
</button>
</div>

</div>

</form>

<div class="info">

<strong>Valores Referenciales:</strong>

<ul style="margin-top:10px;margin-left:20px;">
<li>Solicitud individual: $4.990 a $6.990.</li>
<li>Evaluación médica previa a la emisión de la orden.</li>
<li>Recepción digital de la orden médica.</li>
</ul>

</div>

</div>

</div>

</body>
</html>
