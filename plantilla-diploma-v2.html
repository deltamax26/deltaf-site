<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#e8e8e8;

}

.panel{
  max-width:1180px;
  margin:18px auto;
  background:#fff;
  padding:18px;
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.14);
}

.panel h2{
  margin:0 0 12px;
  color:#00351f;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.campo{
  display:flex;
  flex-direction:column;
  gap:5px;
  font-size:13px;
}

.campo label{font-weight:700}

.campo input,
.campo select{
  padding:9px 10px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
}

.acciones{
  margin-top:14px;

  gap:10px;
  flex-wrap:wrap;
}

button{
  border:0;
  border-radius:8px;
  padding:10px 14px;
  font-weight:700;
  cursor:pointer;
}

.btn-verde{background:#00351f;color:#fff}
.btn-dorado{background:#b38428;color:#fff}
.btn-gris{background:#eee;color:#222}

.hoja{
  width:1123px;
  height:794px;
  margin:20px auto;
  position:relative;
  box-shadow:0 8px 28px rgba(0,0,0,.22);
  overflow:hidden;
  background:#f7eed8;
}

.base{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}

.variable{
  position:absolute;
  text-align:center;
  outline:0;
  color:#071713;
  z-index:5;
  font-family:Georgia,"Times New Roman",serif;
}

.variable:focus{
  background:rgba(255,255,255,.55);
  box-shadow:0 0 0 2px rgba(179,132,40,.45);
  border-radius:4px;
}

  color:#00351f;

#tipoInstitucion{
  top:414px;
  left:390px;
  width:345px;
  font-size:18px;
  letter-spacing:6px;
  color:#8b641e;
  text-transform:uppercase;
  font-weight:700;
}

#aTexto{
  top:448px;

  width:44px;
  font-size:18px;
}

#nombreAlumno{

  left:303px;

#rutAlumno{

#programa{

#otorga{
  top:627px;

#registro{
  top:650px;

  width:140px;
  font-size:15px;

}

#fecha{
  top:684px;
  left:557px;
  width:175px;

#firma{

  left:135px;
  width:185px;
  font-family:"Snell Roundhand","Zapfino","Brush Script MT",cursive;

#cveFea{

@media print{

  .panel{display:none}
  .hoja{
    margin:0;
    width:297mm;
    height:210mm;
    box-shadow:none;
  }

}
</style>
</head>

<body>

<script>
function actualizar(){
  const tituloDoc = document.getElementById("inputTituloDoc").value;
  const tipoInstitucion = document.getElementById("inputTipoInstitucion").value;
  const documento = document.getElementById("inputDocumentoOtorgado").value;

  document.getElementById("tituloDoc").innerText = tituloDoc;
  document.getElementById("tipoInstitucion").innerText = tipoInstitucion;
  document.getElementById("nombreAlumno").innerText = document.getElementById("inputNombreAlumno").value;
  document.getElementById("rutAlumno").innerText = document.getElementById("inputRutAlumno").value;
  document.getElementById("programa").innerText = document.getElementById("inputPrograma").value;
  document.getElementById("otorga").innerText = "otorgÃ¡ndole el " + documento + ".";

  document.getElementById("firma").innerText = document.getElementById("inputFirma").value;
  document.getElementById("cveFea").innerText = document.getElementById("inputCveFea").value;
}

function limpiar(){
  document.getElementById("inputNombreAlumno").value = "";
  document.getElementById("inputRutAlumno").value = "";
  document.getElementById("inputPrograma").value = "";
  document.getElementById("inputRegistro").value = "";
  document.getElementById("inputFecha").value = "";
  document.getElementById("inputCveFea").value = "";
  document.getElementById("inputFirma").value = "";
  actualizar();
}
</script>
