<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso | DeltaF</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#f8fafc;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-container{
width:100%;
max-width:480px;
}

.login-card{
background:white;
padding:40px;
border-radius:24px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:220px;
max-width:100%;
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:10px;
font-size:2rem;
}

.subtitle{
text-align:center;
color:#64748b;
margin-bottom:35px;
}

label{
display:block;
font-weight:600;
margin-bottom:8px;
color:#334155;
}

input{
width:100%;
padding:15px;
border:1px solid #cbd5e1;
border-radius:12px;
margin-bottom:20px;
font-size:1rem;
}

input:focus{
outline:none;
border-color:#2563eb;
}

.login-btn{
width:100%;
padding:16px;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
background:#1d4ed8;
}

.login-btn:disabled{
background:#94a3b8;
cursor:not-allowed;
}

.links{
margin-top:25px;
display:flex;
flex-direction:column;
gap:12px;
text-align:center;
}

.links a{
text-decoration:none;
color:#2563eb;
font-weight:600;
}

.links a:hover{
text-decoration:underline;
}

.back-home{
margin-top:30px;
text-align:center;
}

.back-home a{
text-decoration:none;
color:#64748b;
}

.info-box{
margin-top:25px;
padding:18px;
background:#eff6ff;
border-left:4px solid #2563eb;
border-radius:10px;
font-size:.95rem;
color:#334155;
}

.message{
display:none;
margin-bottom:20px;
padding:14px;
border-radius:10px;
font-weight:600;
font-size:.95rem;
}

.message.success{
display:block;
background:#dcfce7;
color:#166534;
border:1px solid #86efac;
}

.message.error{
display:block;
background:#fee2e2;
color:#991b1b;
border:1px solid #fca5a5;
}
</style>

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="logo">
<img src="./img/logo-deltaf.png" alt="DeltaF">
</div>

<h1>Ingreso DeltaF</h1>

<p class="subtitle">
Accede a tu panel según tu rol
</p>

<div id="mensaje" class="message"></div>

<form id="loginForm">

<label for="email">Correo Electrónico</label>

<input
id="email"
type="email"
placeholder="correo@ejemplo.cl"
required
>

<label for="password">Contraseña</label>

<input
id="password"
type="password"
placeholder="Ingrese su contraseña"
required
>

<button id="btnLogin" class="login-btn" type="submit">
Ingresar
</button>

</form>

<div class="links">

<a href="#" id="recuperarPassword">
¿Olvidó su contraseña?
</a>

<a href="registro-profesional.html">
Crear cuenta profesional
</a>

</div>

<div class="info-box">

<strong>Acceso para usuarios registrados de DeltaF.</strong>

<br><br>

Según el rol asignado, el sistema redirigirá al panel profesional, médico o administrador.

</div>

<div class="back-home">

<a href="index.html">
← Volver al inicio
</a>

</div>

</div>

</div>

<script>
const SUPABASE_URL = "https://goxkmtnmfessroveanje.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_w8xrtEanlJJAc5FYvk1X5A_fKu9vb5d";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginForm = document.getElementById("loginForm");
const mensaje = document.getElementById("mensaje");
const btnLogin = document.getElementById("btnLogin");
const recuperarPassword = document.getElementById("recuperarPassword");

function mostrarMensaje(texto, tipo){
mensaje.textContent = texto;
mensaje.className = "message " + tipo;
}

loginForm.addEventListener("submit", async function(event){
event.preventDefault();

mensaje.className = "message";
mensaje.textContent = "";

btnLogin.disabled = true;
btnLogin.textContent = "Ingresando...";

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

try{

const { data, error } = await supabaseClient.auth.signInWithPassword({
email: email,
password: password
});

if(error){
throw error;
}

/* Primero revisamos si tiene rol especial */
const { data: usuariosData, error: usuarioError } = await supabaseClient
.from("usuarios")
.select("*")
.eq("email", email)
.limit(1);

if(usuarioError){
throw usuarioError;
}

if(usuariosData && usuariosData.length > 0){
const usuario = usuariosData[0];

if(usuario.rol === "superadmin"){
mostrarMensaje("Ingreso administrador correcto. Redirigiendo...", "success");
setTimeout(function(){
window.location.href = "panel-admin.html";
}, 800);
return;
}

if(usuario.rol === "medico"){
mostrarMensaje("Ingreso médico correcto. Redirigiendo...", "success");
setTimeout(function(){
window.location.href = "panel-medico.html";
}, 800);
return;
}

if(usuario.rol === "profesional"){
/* Sigue validación como profesional abajo */
}
}

/* Si no tiene rol especial, validamos como profesional */
const { data: profesionalesData, error: profesionalError } = await supabaseClient
.from("profesionales")
.select("*")
.eq("email", email)
.limit(1);

if(profesionalError){
throw profesionalError;
}

if(!profesionalesData || profesionalesData.length === 0){
await supabaseClient.auth.signOut();
mostrarMensaje("Usuario autenticado, pero no existe perfil profesional asociado.", "error");
btnLogin.disabled = false;
btnLogin.textContent = "Ingresar";
return;
}

const profesional = profesionalesData[0];

if(profesional.estado !== "aprobado"){
await supabaseClient.auth.signOut();
mostrarMensaje("Su cuenta aún está pendiente de aprobación por DeltaF.", "error");
btnLogin.disabled = false;
btnLogin.textContent = "Ingresar";
return;
}

localStorage.setItem("deltaf_profesional_email", profesional.email);
localStorage.setItem("deltaf_profesional_nombre", profesional.nombre);
localStorage.setItem("deltaf_profesional_id", profesional.id);

mostrarMensaje("Ingreso profesional correcto. Redirigiendo...", "success");

setTimeout(function(){
window.location.href = "dashboard-profesional.html";
}, 800);

}catch(error){
console.error(error);
mostrarMensaje("Error de ingreso: " + error.message, "error");
btnLogin.disabled = false;
btnLogin.textContent = "Ingresar";
return;
}

btnLogin.disabled = false;
btnLogin.textContent = "Ingresar";
});

recuperarPassword.addEventListener("click", async function(event){
event.preventDefault();

const email = document.getElementById("email").value.trim().toLowerCase();

if(!email){
mostrarMensaje("Ingrese su correo electrónico para recuperar la contraseña.", "error");
return;
}

try{
const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
redirectTo: "https://deltamax26.github.io/deltaf-site/login.html"
});

if(error){
throw error;
}

mostrarMensaje("Se envió un correo para recuperar su contraseña.", "success");

}catch(error){
console.error(error);
mostrarMensaje("Error: " + error.message, "error");
}
});
</script>

</body>
</html>
